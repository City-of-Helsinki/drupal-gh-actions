on:
  workflow_call:
    inputs:
      domain:
        description: 'The domain'
        required: true
        type: string
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror the website content
        run: |
          wget2 --mirror \
            --convert-links \
            --adjust-extension \
            -P contents \
            -e robots=off \
            # Ignore all assets like images, CSS and JS.
            --ignore-tags=img,link,script,picture,source,meta
            # Only follow <a> links.
            --follow-tags=a

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: results
          path: contents
          retention-days: 10
